# Keeps the green tick on the repo — recruiters do notice.
name: validate
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: terraform fmt
        run: |
          cd terraform && terraform fmt -check -recursive
      - name: yaml lint
        uses: ibiqlik/action-yamllint@v3
        with: { config_data: "{extends: relaxed, rules: {line-length: disable}}" }
      - name: shellcheck
        run: sudo apt-get install -y shellcheck && shellcheck scripts/*.sh terraform/aws-demo/scripts/*.sh
  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ansible syntax check
        run: |
          pip install ansible
          cd ansible && ansible-playbook site.yml --syntax-check -i inventory/hosts.yml
