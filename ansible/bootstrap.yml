---
# Safe first-boot baseline for a fresh Proxmox node.
# Excludes tailscale (needs authkey) and firewall (would lock out LAN SSH).
# Run those deliberately later once Tailscale is verified.
#   ansible-playbook bootstrap.yml --limit k8plus
- name: Proxmox node safe baseline
  hosts: proxmox_nodes
  roles:
    - proxmox_postinstall
    - common
    - node_exporter

# MacBook-only extras, safe for bootstrap (no firewall/tailscale here):
#   - nic_watchdog: self-heals the late USB ethernet adapter after reboot (ADR-002)
#   - console_blank: sleeps the laptop's internal panel to avoid burn-in
- name: MacBook lab-node baseline extras
  hosts: lab
  roles:
    - nic_watchdog
    - console_blank
