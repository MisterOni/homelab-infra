# Static inventory — adjust IPs to your LAN plan.
all:
  children:
    proxmox_nodes:
      hosts:
        k8plus:   { ansible_host: 192.168.0.11 }
        g11:      { ansible_host: 192.168.0.12 }
        macbook:  { ansible_host: 192.168.0.13 }
    docker_hosts:
      hosts:
        family-vm: { ansible_host: 192.168.0.21 }
        media-vm:  { ansible_host: 192.168.0.22 }
        # monitor-vm: { ansible_host: 192.168.0.31 } lives on g11 - add when g11 is built
      vars:
        ansible_user: ubuntu # cloud-init VMs, not root
    lab:
      hosts:
        macbook:
  vars:
    ansible_user: root # Proxmox hosts login as root
