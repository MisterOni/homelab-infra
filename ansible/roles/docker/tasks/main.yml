---
# Docker from the official apt repo — never curl | bash.
- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"

- name: Install Docker
  ansible.builtin.apt:
    name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
    update_cache: true

- name: Enable and start
  ansible.builtin.service: { name: docker, state: started, enabled: true }

- name: Add the login user to the docker group (no sudo needed for docker CLI)
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  # NOTE: existing SSH sessions must reconnect for the new group to take effect.
