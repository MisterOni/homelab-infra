---
# Proxmox VE 9 (Debian trixie) uses the deb822 .sources format.
# This role is version-aware via ansible_distribution_release
# (trixie on PVE9, bookworm on PVE8), so it works on both.

- name: Disable enterprise PVE repo (deb822)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    state: absent

- name: Disable enterprise Ceph repo (deb822)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/ceph.sources
    state: absent

- name: Remove any legacy .list enterprise repos
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/pve-enterprise.list
    - /etc/apt/sources.list.d/ceph.list

- name: Add no-subscription repo (deb822)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ ansible_distribution_release }}
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Full upgrade
  ansible.builtin.apt:
    upgrade: dist
