---
# One playbook, three identical nodes. Re-running it on a fresh node
# is the whole point: second run should take ten minutes, not a weekend.
- name: Proxmox node baseline
  hosts: proxmox_nodes
  roles:
    - proxmox_postinstall
    - common
    - node_exporter
    - disk_health        # ZFS pool + SMART metrics → Prometheus (see July 24 disk cascade)
    - tailscale
    - proxmox_firewall   # cluster.fw — see ADR-003/005

# Network layout (ADR-005). Run this play deliberately, one node at a time,
# with a console/KVM handy — a bad /etc/network/interfaces locks you out.
#   ansible-playbook site.yml --tags network --limit k8plus
- name: Proxmox dual-NIC network (ADR-005)
  hosts: proxmox_nodes
  tags: [network]
  roles:
    - proxmox_network

- name: Docker hosts baseline
  hosts: docker_hosts
  roles:
    - common
    - docker
    - node_exporter

- name: MacBook lab-node extras — NIC self-heal + panel blank (ADR-002)
  hosts: lab
  tags: [lab]
  roles:
    - nic_watchdog
    - console_blank
