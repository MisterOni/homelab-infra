# Observability stack — monitor-vm on the G11 (core-infra tier).
# Prometheus scrapes every node_exporter in the fleet; Grafana visualises it,
# with the datasource + dashboards provisioned from git (NOT clicked together in
# the UI). uptime-kuma gives a simple up/down status page.
# Reach these over Tailscale only — never expose the admin ports publicly.
#
# TODO (next iteration): Loki + Promtail for centralized logs, and Grafana SMTP
# alerting via Proton Bridge. Left out for now to keep the first deploy simple.
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prom-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports: ["9090:9090"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on: [prometheus]
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports: ["3000:3000"]
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes: [kuma-data:/app/data]
    ports: ["3001:3001"]
    restart: unless-stopped

volumes: { prom-data: {}, grafana-data: {}, kuma-data: {} }
